<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find the Odd Candy</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #fff5f7;
    margin: 0;
    padding: 20px;
  }
  h1 {
    margin-bottom: 5px;
  }
  #info {
    margin-bottom: 15px;
  }
  #game {
    display: grid;
    justify-content: center;
    gap: 10px;
  }
  .cell {
    font-size: 32px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s;
  }
  .cell:hover {
    transform: scale(1.2);
  }
  #startBtn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🍬 Find the Odd One Out!</h1>
<div id="info">
  Score: <span id="score">0</span> |
  Time: <span id="time">10</span>s
</div>
<button id="startBtn">Start Game</button>

<div id="game"></div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

let score = 0;
let time = 10;
let timer;
let gridSize = 3;

function startGame() {
  score = 0;
  time = 10;
  gridSize = 3;
  scoreEl.textContent = score;
  timeEl.textContent = time;
  startBtn.style.display = "none";

  timer = setInterval(() => {
    time--;
    timeEl.textContent = time;
    if (time <= 0) endGame();
  }, 1000);

  nextRound();
}

function nextRound() {
  game.innerHTML = "";

  // increase difficulty
  if (score % 3 === 0 && gridSize < 8) {
    gridSize++;
  }

  game.style.gridTemplateColumns = `repeat(${gridSize}, 60px)`;

  const total = gridSize * gridSize;
  const oddIndex = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    if (i === oddIndex) {
      cell.textContent = "🍪"; // odd one
      cell.onclick = () => {
        score++;
        scoreEl.textContent = score;
        time += 2;
        nextRound();
      };
    } else {
      cell.textContent = "🍬";
      cell.onclick = () => {
        time -= 2;
        if (time < 0) time = 0;
        timeEl.textContent = time;
      };
    }

    game.appendChild(cell);
  }
}

function endGame() {
  clearInterval(timer);
  game.innerHTML = "";
  startBtn.style.display = "inline-block";
  alert("Game Over! Your score: " + score);
}

startBtn.onclick = startGame;
</script>

</body>
</html>
