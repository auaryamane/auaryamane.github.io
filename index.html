<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Site Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-top: 10px;
    }

    .buttons {
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      margin-right: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .primary { background: #22c55e; }
    .secondary { background: #3b82f6; color: white; }
    .deploy { background: #f59e0b; }

    #status {
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 450px;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 AI Website Builder</h1>

  <textarea id="prompt" placeholder="Describe your website..."></textarea>

  <div class="buttons">
    <button class="secondary" onclick="startVoice()">🎤 Voice</button>
    <button class="primary" onclick="generate()">Generate</button>
    <button class="deploy" onclick="deploy()">Deploy</button>
  </div>

  <div id="status">Ready</div>

  <iframe id="preview"></iframe>
</div>

<script>
  // 🔥 CHANGE THIS LATER
  const BASE_URL = "https://YOUR_RAILWAY_URL";

  let generatedHTML = "";

  function startVoice() {
    if (!('webkitSpeechRecognition' in window)) {
      alert("Voice not supported in this browser.");
      return;
    }

    const recognition = new webkitSpeechRecognition();
    recognition.start();

    recognition.onresult = function(event) {
      document.getElementById("prompt").value =
        event.results[0][0].transcript;
    };
  }

  async function generate() {
    const prompt = document.getElementById("prompt").value;
    const status = document.getElementById("status");

    if (!prompt) {
      status.innerText = "Enter a prompt first.";
      return;
    }

    try {
      status.innerText = "Generating...";

      const res = await fetch(BASE_URL + "/generate-site", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt: prompt })
      });

      const data = await res.json();
      generatedHTML = data.html;

      document.getElementById("preview").srcdoc = generatedHTML;

      status.innerText = "Preview ready";
    } catch (err) {
      console.error(err);
      status.innerText = "Error generating site";
    }
  }

  async function deploy() {
    const status = document.getElementById("status");

    if (!generatedHTML) {
      status.innerText = "Generate first";
      return;
    }

    try {
      status.innerText = "Deploying...";

      const res = await fetch(BASE_URL + "/commit-to-github", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ html: generatedHTML })
      });

      const data = await res.json();

      if (data.status === "success") {
        status.innerText = "Deployed successfully!";
      } else {
        status.innerText = "Deploy failed";
      }

    } catch (err) {
      console.error(err);
      status.innerText = "Error deploying";
    }
  }
</script>

</body>
</html>
